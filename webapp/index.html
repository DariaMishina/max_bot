<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гадание на Таро</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://max.ru/js/max-web-app.js" async></script>
</head>
<body>
    <div class="container">
        <h1>🔮 Гадание на Таро</h1>

        <!-- Шаг 1: ввод вопроса (показывается, если нет сохранённого вопроса из чата) -->
        <div id="step-question" class="step-question">
            <p class="step-label">Напишите ваш вопрос к картам:</p>
            <textarea id="question-input" class="question-input" placeholder="Например: что меня ждёт в любви?" rows="3" maxlength="500"></textarea>
            <button id="question-next-btn" class="confirm-btn question-next-btn">Далее → Выбрать карты</button>
        </div>

        <!-- Показ сохранённого вопроса (из чата) — без повторного ввода -->
        <div id="question-box" class="question-box hidden"></div>

        <!-- Шаг 2: выбор карт -->
        <div id="step-cards" class="step-cards hidden">
            <p class="subtitle">Выберите 3 карты для гадания:</p>
            <p class="counter">Выбрано: <span id="count">0</span>/3</p>

            <div id="cards-grid" class="cards-grid">
                <p id="grid-loader" style="grid-column:1/-1;text-align:center;color:#b0b0d0;padding:40px 0;">Загрузка карт…</p>
            </div>

            <div class="bottom-bar">
                <button id="confirm-btn" class="confirm-btn" disabled>
                    🔮 Получить гадание
                </button>

                <button id="reset-btn" class="reset-btn hidden">
                    🔄 Выбрать заново
                </button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Отправляю карты...</p>
            </div>

            <div id="success" class="success hidden">
                <p>✅ Карты отправлены!</p>
                <p class="hint">Загляните в чат — там будет толкование 🔮</p>
            </div>

            <div id="error" class="error-msg hidden">
                <p>❌ Произошла ошибка</p>
                <p class="hint" id="error-text"></p>
                <button class="retry-btn" onclick="location.reload()">Попробовать снова</button>
            </div>
        </div>

        <div id="loading-pending" class="loading loading-pending hidden">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>
    </div>

    <script src="card-data.js" defer></script>
    <!-- Бэкенд для отправки карт: туннель к VM (при перезапуске туннеля URL поменяется — обновите здесь) -->
    <script>window.WEBAPP_API_URL = 'https://medicine-miss-knights-admit.trycloudflare.com';</script>
    <script src="app.js" defer></script>
</body>
</html>
